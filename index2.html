<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>狀態指數儀2 - 最終修正版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center; 
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: sans-serif;
            overflow-y: auto;
            touch-action: pan-y;
        }

        .gauge-section {
            position: relative;
            width: 95vw;
            max-width: 600px;
            margin-top: 5vh; 
            user-select: none;
            -webkit-user-select: none;
            /* 確保左上角頭像裁切整齊 */
            overflow: hidden; 
            border-radius: 5px;
        }

        .background-img {
            width: 100%;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            pointer-events: none; 
        }

        /* 修正 1：頭像完全貼齊左上角盡頭 */
        #overlay-avatar {
            position: absolute;
            top: 0;    
            left: 0;   
            width: 22%; /* 根據背景圖比例自動調整大小，約佔左上角區塊 */
            height: auto;
            z-index: 5;    
            display: none;
            pointer-events: none;
        }

        /* 修正 2：指針容器位置對準銀色扣 (47.5%) */
        .needle-container {
            position: absolute;
            bottom: 6.5%; 
            left: 47.5%; 
            transform: translateX(-50%);
            width: 0;
            height: 0;
            z-index: 10;
        }

        #needle {
            position: absolute;
            bottom: 0;
            left: -20px; 
            width: 40px;
            height: 140px; 
            transform-origin: bottom center;
            transform: rotate(0deg); 
            transition: transform 0.05s linear; 
            cursor: grab;
            filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.3));
            touch-action: none;
        }

        #needle:active {
            cursor: grabbing;
        }

        .pivot {
            position: absolute;
            bottom: -8px;
            left: -8px;
            width: 16px;
            height: 16px;
            background-color: #888;
            border-radius: 50%;
            border: 1px solid #333;
            z-index: 11;
        }

        /* 底部頭像列表 */
        .avatar-list {
            display: flex;
            justify-content: center;
            gap: 15px;       
            margin-top: 30px; 
            margin-bottom: 40px; 
            width: 95vw;
            max-width: 600px;
        }

        .avatar-item {
            width: 70px;     
            height: 70px;
            border-radius: 50%; 
            overflow: hidden;   
            border: 3px solid #eee; 
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            background-color: white;
        }

        .avatar-item.active {
            border-color: #FFD700; 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
        }

        .avatar-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

    </style>
</head>
<body>

    <div class="gauge-section">
        <img src="https://i.imgur.com/SJ5ZpYj.jpeg" alt="Background" class="background-img">
        
        <img id="overlay-avatar" src="" alt="Overlay Avatar">

        <div class="needle-container">
            <svg id="needle" viewBox="0 0 40 140">
                <path d="M20,0 L0,35 L12,35 L12,140 L28,140 L28,35 L40,35 Z" 
                      fill="#FFD700" 
                      stroke="#000000" 
                      stroke-width="2" 
                      stroke-linejoin="round"/>
            </svg>
            <div class="pivot"></div>
        </div>
    </div>

    <div class="avatar-list">
        <div class="avatar-item" data-avatar="https://i.imgur.com/tAd34Op.jpeg">
            <img src="https://i.imgur.com/tAd34Op.jpeg" alt="小男孩">
        </div>
        <div class="avatar-item" data-avatar="https://i.imgur.com/ksTj6cw.jpeg">
            <img src="https://i.imgur.com/ksTj6cw.jpeg" alt="女士1">
        </div>
        <div class="avatar-item" data-avatar="https://i.imgur.com/WeH7MAT.jpeg">
            <img src="https://i.imgur.com/WeH7MAT.jpeg" alt="女士2">
        </div>
        <div class="avatar-item" data-avatar="https://i.imgur.com/yK1OhEC.jpeg">
            <img src="https://i.imgur.com/yK1OhEC.jpeg" alt="先生">
        </div>
    </div>

    <script>
        const needle = document.getElementById('needle');
        const container = document.querySelector('.needle-container');
        let isDragging = false;

        // 更新旋轉邏輯
        function updateRotation(e) {
            const rect = container.getBoundingClientRect();
            // 中心點取 container 的位置
            const centerX = rect.left; 
            const centerY = rect.top;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;

            let angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
            let finalAngle = angle + 90;

            // 限制範圍在 -90 到 90 度
            if (finalAngle < -90) {
                finalAngle = (finalAngle < -180) ? 90 : -90;
            } else if (finalAngle > 90) {
                finalAngle = 90;
            }

            needle.style.transform = `rotate(${finalAngle}deg)`;
        }

        const onStart = (e) => { isDragging = true; updateRotation(e); };
        const onEnd = () => { isDragging = false; };
        const onMove = (e) => { if (isDragging) { if (e.cancelable) e.preventDefault(); updateRotation(e); } };

        window.addEventListener('mousedown', onStart);
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchstart', onStart, { passive: false });
        window.addEventListener('touchend', onEnd);
        window.addEventListener('touchmove', onMove, { passive: false });

        // 頭像切換邏輯
        const overlayAvatar = document.getElementById('overlay-avatar');
        const avatarItems = document.querySelectorAll('.avatar-item');

        avatarItems.forEach(item => {
            item.addEventListener('click', function() {
                const imgUrl = this.getAttribute('data-avatar');
                overlayAvatar.src = imgUrl;
                overlayAvatar.style.display = 'block'; 
                
                // 更新選取樣式
                avatarItems.forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
