<!DOCTYPE html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>狀態指數儀</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
        font-family: sans-serif;
        overflow: hidden;
        touch-action: none;
      }

      .container {
        position: relative;
        /* 關鍵修改：同時限制最大寬度與最大高度 */
        width: 95vw;
        height: 95vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .background-img {
        /* 讓圖片根據比例縮放，不超出容器高度或寬度 */
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        display: block;
        border-radius: 5px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      /* 重新調整指標容器位置，使其相對於圖片而不是容器 */
      .needle-container {
        position: absolute;
        /* 根據您的圖片比例，這部分可能需要微調 */
        bottom: 12%;
        left: 50%;
        width: 0;
        height: 0;
        z-index: 10;
      }

      #needle {
        position: absolute;
        bottom: 0;
        left: -15px; /* 稍微縮小寬度以適應小螢幕 */
        width: 30px;
        height: 100px; /* 縮短長度防止超出邊界 */
        transform-origin: bottom center;
        transform: rotate(-90deg);
        transition: transform 0.05s ease-out;
        cursor: pointer;
        filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.3));
      }

      .pivot {
        position: absolute;
        bottom: -6px;
        left: -6px;
        width: 12px;
        height: 12px;
        background-color: #888;
        border-radius: 50%;
        border: 1px solid #333;
        z-index: 11;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://i.imgur.com/SJ5ZpYj.jpeg"
        alt="Background"
        class="background-img"
      />

      <div class="needle-container">
        <svg id="needle" viewBox="0 0 40 140">
          <path
            d="M20,0 L0,35 L12,35 L12,140 L28,140 L28,35 L40,35 Z"
            fill="#FFD700"
            stroke="#000000"
            stroke-width="2"
            stroke-linejoin="round"
          />
        </svg>
        <div class="pivot"></div>
      </div>
    </div>

    <script>
      const needle = document.getElementById("needle");
      let isDragging = false;

      function updateRotation(e) {
        const containerRect = document
          .querySelector(".needle-container")
          .getBoundingClientRect();
        const centerX = containerRect.left;
        const centerY = containerRect.top;

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const deltaX = clientX - centerX;
        const deltaY = clientY - centerY;

        let angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);

        if (angle > 0) {
          angle = angle > 90 ? -180 : 0;
        }

        needle.style.transform = `rotate(${angle + 90}deg)`;
      }

      // 滑鼠事件
      window.addEventListener("mousedown", () => (isDragging = true));
      window.addEventListener("mouseup", () => (isDragging = false));
      window.addEventListener("mousemove", (e) => {
        if (isDragging) updateRotation(e);
      });

      // 觸控事件
      window.addEventListener(
        "touchstart",
        (e) => {
          isDragging = true;
          updateRotation(e);
        },
        { passive: false }
      );

      window.addEventListener("touchend", () => (isDragging = false));
      window.addEventListener(
        "touchmove",
        (e) => {
          if (isDragging) {
            e.preventDefault();
            updateRotation(e);
          }
        },
        { passive: false }
      );
    </script>
  </body>
</html>
