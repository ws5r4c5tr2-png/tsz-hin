<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>狀態指數儀</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            /* 改為從頂部開始排列，確保下方的 Margin 能生效 */
            align-items: flex-start; 
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: sans-serif;
            /* 允許垂直捲動以看見底部空白 */
            overflow-y: auto;
            touch-action: none;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 600px;
            /* 調整上方間距，讓畫面視覺更平衡 */
            margin-top: 5vh; 
            /* 增加約 1cm 的空白高度 (1cm ≈ 37.8px) */
            margin-bottom: 38px; 
        }

        .background-img {
            width: 100%;
            display: block;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 指標容器位置：對準銀色金屬扣 */
        .needle-container {
            position: absolute;
            bottom: 6.5%; 
            left: 47.5%; 
            width: 0;
            height: 0;
            z-index: 10;
        }

        /* SVG 箭頭：帶有黑色邊框 */
        #needle {
            position: absolute;
            bottom: 0;
            left: -20px; 
            width: 40px;
            height: 140px; 
            transform-origin: bottom center;
            transform: rotate(-90deg);
            transition: transform 0.05s ease-out;
            cursor: pointer;
            filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.3));
        }

        /* 底部圓點 */
        .pivot {
            position: absolute;
            bottom: -8px;
            left: -8px;
            width: 16px;
            height: 16px;
            background-color: #888;
            border-radius: 50%;
            border: 1px solid #333;
            z-index: 11;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.imgur.com/SJ5ZpYj.jpeg" alt="Background" class="background-img">
        
        <div class="needle-container">
            <svg id="needle" viewBox="0 0 40 140">
                <path d="M20,0 L0,35 L12,35 L12,140 L28,140 L28,35 L40,35 Z" 
                      fill="#FFD700" 
                      stroke="#000000" 
                      stroke-width="2" 
                      stroke-linejoin="round"/>
            </svg>
            <div class="pivot"></div>
        </div>
    </div>

    <script>
        const needle = document.getElementById('needle');
        let isDragging = false;

        function updateRotation(e) {
            const containerRect = document.querySelector('.needle-container').getBoundingClientRect();
            const centerX = containerRect.left;
            const centerY = containerRect.top;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;

            let angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);
            
            if (angle > 0) {
                angle = angle > 90 ? -180 : 0;
            }
            
            needle.style.transform = `rotate(${angle + 90}deg)`;
        }

        // 滑鼠事件
        window.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) updateRotation(e);
        });

        // 觸控事件
        window.addEventListener('touchstart', (e) => {
            isDragging = true;
            updateRotation(e);
        }, { passive: false });
        
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
                updateRotation(e);
            }
        }, { passive: false });
    </script>
</body>
</html>
