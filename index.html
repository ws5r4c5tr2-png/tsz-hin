<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>狀態指數儀</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: #ffffff; /* 改為白色讓邊緣更融合 */
            overflow: hidden;
            touch-action: none;
        }

        .container {
            position: relative;
            /* 預設寬度填滿 */
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease;
        }

        /* 當手機直向時，強制旋轉並讓寬度填滿整個螢幕高度 */
        @media (orientation: portrait) {
            .container {
                transform: rotate(90deg);
                width: 100vh; 
                height: 100vw;
            }
            .background-img {
                width: 100vh !important; /* 強制寬度填滿長邊 */
                height: auto;
            }
        }

        /* 當手機橫向時 */
        @media (orientation: landscape) {
            .container {
                width: 100vw;
                height: 100vh;
            }
            .background-img {
                height: 100vh; /* 強制高度填滿短邊 */
                width: auto;
            }
        }

        .background-img {
            display: block;
            max-width: none;
            max-height: none;
            /* 移除陰影與圓角以獲得純淨全螢幕感 */
            border-radius: 0;
            box-shadow: none;
        }

        /* 旋轉指標容器 */
        .needle-container {
            position: absolute;
            bottom: 6.5%; 
            left: 47.5%; 
            width: 0;
            height: 0;
            z-index: 10;
        }

        #needle {
            position: absolute;
            bottom: 0;
            left: -20px; 
            width: 40px;
            height: 35vh; /* 根據螢幕高度動態調整指標長度 */
            max-height: 200px;
            transform-origin: bottom center;
            transform: rotate(-90deg);
            cursor: pointer;
            filter: drop-shadow(0px 2px 3px rgba(0,0,0,0.3));
        }

        .pivot {
            position: absolute;
            bottom: -8px;
            left: -8px;
            width: 16px;
            height: 16px;
            background-color: #888;
            border-radius: 50%;
            border: 1px solid #333;
            z-index: 11;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.imgur.com/SJ5ZpYj.jpeg" alt="Background" class="background-img">
        <div class="needle-container">
            <svg id="needle" viewBox="0 0 40 140">
                <path d="M20,0 L0,35 L12,35 L12,140 L28,140 L28,35 L40,35 Z" 
                      fill="#FFD700" 
                      stroke="#000000" 
                      stroke-width="2" 
                      stroke-linejoin="round"/>
            </svg>
            <div class="pivot"></div>
        </div>
    </div>

    <script>
        const needle = document.getElementById('needle');
        const container = document.querySelector('.container');
        let isDragging = false;

        function updateRotation(e) {
            const needleRect = document.querySelector('.needle-container').getBoundingClientRect();
            
            const centerX = needleRect.left + (needleRect.width / 2);
            const centerY = needleRect.top + (needleRect.height / 2);

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const deltaX = clientX - centerX;
            const deltaY = clientY - centerY;

            let angle = Math.atan2(deltaY, deltaX) * (180 / Math.PI);

            const isPortrait = window.innerHeight > window.innerWidth;
            if (isPortrait) {
                angle -= 90;
            }
            
            if (angle > 0 && angle < 180) {
                angle = (angle > 90) ? -180 : 0;
            }
            
            needle.style.transform = `rotate(${angle + 90}deg)`;
        }

        const start = (e) => { isDragging = true; updateRotation(e); };
        const end = () => { isDragging = false; };
        const move = (e) => { 
            if (isDragging) {
                if(e.cancelable) e.preventDefault();
                updateRotation(e);
            }
        };

        window.addEventListener('mousedown', start);
        window.addEventListener('mouseup', end);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchstart', start, { passive: false });
        window.addEventListener('touchend', end);
        window.addEventListener('touchmove', move, { passive: false });
    </script>
</body>
</html>
